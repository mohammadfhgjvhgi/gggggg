// ⭐ boolean → string "true"/"false"
function fbWrite(path, val) {
  if (typeof val === 'boolean') val = val ? "true" : "false";
  if (db) db.ref(path).set(val);
}

function fbRead(path) {
  return db ? db.ref(path).once('value').then(s => s.val()) : Promise.resolve(null);
}

function fbListen(path, cb) {
  if (!db) return () => {};
  const r = db.ref(path);
  r.on('value', s => cb(s.val()));
  return () => r.off();
}

          </div>
        </div>
        <div class="px-5 pb-5 space-y-5">
          <div class="flex items-center justify-between rounded-xl bg-white/[0.06] border border-white/[0.1] px-4 py-3.5">
            <div class="flex items-center gap-3">
              <i data-lucide="volume-2" class="size-4 text-[#b0acb8]"></i>
              <div>

function gateDoorCard(title, isOpen, path, icon, desc) {
  return '<div class="animate-fade-up" style="animation-delay:0.1s;"><div class="glass rounded-xl overflow-hidden ' + (isOpen ? 'ring-1 ring-green-500/20' : '') + '"><div class="p-5 pb-4"><div class="flex items-center justify-between mb-1"><div class="flex items-center gap-3"><div class="flex size-11 items-center justify-center rounded-xl ' + (isOpen ? 'bg-green-500/15 ring-1 ring-green-500/25' : 'bg-white/5 ring-1 ring-white/10') + '"><i data-lucide="' + icon + '" class="size-5 ' + (isOpen ? 'text-green-400' : 'text-[#b0acb8]') + '"></i></div><div><h3 class="text-base font-bold text-[#f5f0e8] font-display">' + title + '</h3><p class="text-[11px] text-[#b0acb8]/90 mt-0.5 leading-relaxed">' + desc + '</p></div></div><span class="text-[10px] px-2 py-0.5 rounded-full backdrop-blur-sm ' + (isOpen ? 'bg-green-500/10 text-green-400 border border-green-500/25' : 'bg-white/5 text-[#b0acb8] border border-white/10') + '">' + (isOpen ? 'مفتوحة' : 'مغلقة') + '</span></div></div><div class="px-5 pb-5 space-y-3"><button onclick="fbWrite(\'/wedding_hall/' + path + '/open\', true)" ' + (!state.esp32.online ? 'disabled' : '') + ' class="w-full py-3.5 rounded-xl text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-2 border-none cursor-pointer ' + (isOpen ? 'bg-gradient-to-r from-green-600 to-green-500 text-white ring-1 ring-green-400/30' : 'bg-white/[0.08] text-[#b0acb8] hover:bg-white/[0.12] hover:text-[#f5f0e8] border border-white/[0.1]') + '" style="' + (isOpen ? 'box-shadow:0 4px 16px rgba(34,197,94,0.2);' : '') + '"><i data-lucide="door-open" class="size-4"></i> فتح</button><button onclick="fbWrite(\'/wedding_hall/' + path + '/open\', false)" ' + (!state.esp32.online ? 'disabled' : '') + ' class="w-full py-3.5 rounded-xl text-sm font-semibold transition-all duration-200 flex items-center justify-center gap-2 border-none cursor-pointer ' + (!isOpen ? 'bg-gradient-to-r from-[#2a2a35] to-[#1e1e28] text-[#b0acb8] ring-1 ring-white/[0.1]' : 'bg-red-500/10 text-red-400 hover:bg-red-500/15 border border-red-500/20') + '"><i data-lucide="door-closed" class="size-4"></i> إغلاق</button></div></div></div>';
}

function toggleSeat() { fbWrite('/wedding_hall/seat/active', !state.esp32.seatActive); }
function resetSeat() { fbWrite('/wedding_hall/seat/active', false); }
function toggleLight(key) { fbWrite('/wedding_hall/lights/' + key, !state.esp32.lights[key]); }
function lightsAll(on) { ['street','ship','ceiling','floor','pillar_outer','pillar_inner'].forEach(k => fbWrite('/wedding_hall/lights/' + k, on)); }
function toggleMp3() { fbWrite('/wedding_hall/mp3/playing', !state.esp32.mp3Playing); }
function nextTrack() { const t = state.esp32.mp3Track + 1; fbWrite('/wedding_hall/mp3/track', t); if (!state.esp32.mp3Playing) fbWrite('/wedding_hall/mp3/playing', true); }
function prevTrack() { const t = Math.max(0, state.esp32.mp3Track - 1); fbWrite('/wedding_hall/mp3/track', t); if (!state.esp32.mp3Playing) fbWrite('/wedding_hall/mp3/playing', true); }
function playTrack(e) { e.preventDefault(); const v = parseInt(document.getElementById('trackInput').value); if (!isNaN(v) && v >= 0) { fbWrite('/wedding_hall/mp3/track', v); fbWrite('/wedding_hall/mp3/playing', true); } }
function playTrackNum(t) { fbWrite('/wedding_hall/mp3/track', t); fbWrite('/wedding_hall/mp3/playing', true); }

// ═══════════════════════════════════════
//   CALENDAR PAGE
// ═══════════════════════════════════════
function renderCalendarPage() {
  const ARABIC_DAYS = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const ARABIC_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += '<div class="h-16"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === now.getDate();
    cells += '<button class="h-16 rounded-lg text-center transition-all duration-200 relative border ' + (isToday ? 'border-2 border-pink-400 bg-pink-500/10' : 'border border-transparent hover:bg-[#1a1a25]/50') + '"><span class="text-sm font-medium ' + (isToday ? 'text-pink-400 font-bold' : 'text-[#f5f0e8]') + '">' + d + '</span></button>';
  }
  const remaining = (7 - ((firstDay + daysInMonth) % 7)) % 7;
  for (let i = 0; i < remaining; i++) cells += '<div class="h-16"></div>';
  return '<div class="space-y-6 animate-fade-up" style="position:relative;z-index:1;"><div><h2 class="text-2xl font-bold flex items-center gap-3 text-gradient-calendar font-display"><i data-lucide="calendar-days" class="h-6 w-6 text-pink-400"></i> التقويم</h2><p class="text-[#8a8690] text-sm mt-1">عرض الحجوزات الشهرية</p></div><div class="glass rounded-xl overflow-hidden card-hover border-pink-500/[0.12]"><div class="p-4 sm:p-6"><div class="flex items-center justify-between mb-6"><span class="text-xl font-bold text-gradient-calendar font-display tracking-wide">' + ARABIC_MONTHS[month] + ' ' + year + '</span></div><div class="grid grid-cols-7 gap-1 mb-2">' + ARABIC_DAYS.map(d => '<div class="text-center text-xs font-semibold text-[#8a8690] py-2">' + d + '</div>').join('') + '</div><div class="grid grid-cols-7 gap-1">' + cells + '</div><div class="flex items-center justify-center gap-5 mt-5 pt-4 border-t border-[#1f1f2e]"><div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-green-500"></div><span class="text-xs text-[#8a8690]">مؤكد</span></div><div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-yellow-500"></div><span class="text-xs text-[#8a8690]">معلق</span></div><div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full bg-red-500"></div><span class="text-xs text-[#8a8690]">ملغي</span></div></div></div></div></div>';
}
